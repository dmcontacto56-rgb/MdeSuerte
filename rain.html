<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rain — M de Suerte</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; cursor: none; }
    canvas { display: block; }
    #cursor {
      position: fixed;
      width: 4px; height: 4px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>
<div id="cursor"></div>
<script>
const cursor = document.getElementById('cursor');
let mx = -999, my = -999;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
});

new p5(function(p) {
  let drops = [];
  const NUM = 500;
  const MOUSE_R = 50;

  class Drop {
    constructor() { this.init(); }

    init() {
      this.x      = p.random(p.width);
      this.y      = p.random(-300, 0);
      this.speed  = p.random(1, 4) * 2;
      this.c      = p.color(p.random(255), p.random(255), p.random(255));
      this.eX     = 0;
      this.eY     = 0;
      this.endPos = p.height - p.random(300);
      this.done   = false;
      this.vx     = 0;
      this.vy     = 0;
    }

    update() {
      if (this.done) {
        this.eX += this.speed * 0.2;
        this.eY += this.speed * 0.5;
        if (this.eX > 50) this.init();
        return;
      }

      // Mouse repulsion
      const dx = this.x - mx;
      const dy = this.y - my;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < MOUSE_R && dist > 0) {
        const force = (MOUSE_R - dist) / MOUSE_R;
        const angle = Math.atan2(dy, dx);
        this.vx += Math.cos(angle) * force * 4;
        this.vy += Math.sin(angle) * force * 4;
      }

      this.vx *= 0.85;
      this.vy *= 0.85;
      this.x  += this.vx;
      this.y  += this.speed + this.vy;

      if (this.x < 0) { this.x = 0; this.vx *= -0.5; }
      if (this.x > p.width) { this.x = p.width; this.vx *= -0.5; }

      if (this.y >= this.endPos) {
        this.y = this.endPos;
        this.done = true;
      }
    }

    draw() {
      if (!this.done) {
        p.fill(this.c);
        p.noStroke();
        p.rect(this.x, this.y, 2, 15);
      } else {
        // splash: charco horizontal en el suelo
        const fade = p.map(this.eX, 0, 50, 255, 0);
        p.stroke(p.red(this.c), p.green(this.c), p.blue(this.c), fade);
        p.strokeWeight(0.8);
        p.noFill();
        p.ellipse(this.x, this.endPos, this.eX * 2, this.eY * 0.35);
      }
    }
  }

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.noSmooth();
    for (let i = 0; i < NUM; i++) drops.push(new Drop());
  };

  p.draw = function() {
    p.fill(0, 70);
    p.noStroke();
    p.rect(0, 0, p.width, p.height);
    drops.forEach(d => { d.update(); d.draw(); });
  };

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
  };
});
</script>
</body>
</html>
