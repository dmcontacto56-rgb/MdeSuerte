<!DOCTYPE html>
<html lang="es"> 
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M DE SUERTE — Marco Mariscurrena</title>
  
  <!-- p5.js para el efecto de lluvia -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>

  <style>
    :root {
      --bg: #080808;
      --accent: #00ff41; /* Verde Matrix/Suerte */
    }

    body {
      margin: 0;
      background-color: var(--bg);
      color: white;
      font-family: 'Helvetica Neue', Helvetica, sans-serif;
    }

    /* El canvas de la lluvia siempre al fondo */
    #rain-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    nav {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: rgba(8, 8, 8, 0.9);
      backdrop-filter: blur(10px);
      z-index: 1000;
      border-bottom: 1px solid #1a1a1a;
    }

    .gallery-section {
      padding: 50px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ESTO ARREGLA EL DESMADRE DE LAS IMÁGENES ENCIMADAS */
    .gallery-grid {
      column-count: 3; /* 3 columnas */
      column-gap: 20px;
      width: 100%;
    }

    .gallery-item {
      display: inline-block; /* Evita que colapsen */
      width: 100%;
      margin-bottom: 20px;
      border-radius: 4px;
      overflow: hidden;
      background: #111;
      transition: transform 0.3s ease;
    }

    .gallery-item img {
      width: 100%;
      height: auto; /* Respeta la proporción de tus renders */
      display: block;
      filter: grayscale(1);
      transition: filter 0.4s ease;
    }

    .gallery-item:hover { transform: translateY(-5px); }
    .gallery-item:hover img { filter: grayscale(0); }

    .label {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 20px;
      display: block;
    }

    /* Ajuste para cel */
    @media (max-width: 800px) { .gallery-grid { column-count: 2; } }
    @media (max-width: 500px) { .gallery-grid { column-count: 1; } }
  </style>
</head>
<body>

  <div id="rain-canvas"></div>

  <nav>
    <div style="letter-spacing: 5px;">M DE SUERTE</div>
    <div style="font-size: 10px; color: var(--accent);">MARCO MARISCURRENA — 2026</div>
  </nav>

  <section class="gallery-section">
    <span class="label">// Visual Production</span>
    <div id="renders-grid" class="gallery-grid"></div>
  </section>

  <section class="gallery-section">
    <span class="label">// Digital Arts</span>
    <div id="design-grid" class="gallery-grid"></div>
  </section>

  <script>
    // FUNCIÓN PARA CARGAR TUS ARCHIVOS REALES DE GITHUB
    async function loadWork(jsonFile, targetId) {
      const container = document.getElementById(targetId);
      try {
        const response = await fetch(jsonFile);
        const images = await response.json();
        
        container.innerHTML = images.map(img => `
          <div class="gallery-item">
            <img src="${img.url}" alt="Work" loading="lazy">
          </div>
        `).join('');
      } catch (err) {
        console.error("No se pudo cargar: " + jsonFile);
      }
    }

    // Ejecutar carga
    window.onload = () => {
      loadWork('renders.json', 'renders-grid');
      loadWork('design.json', 'design-grid');
    };

    // --- EFECTO DE LLUVIA (p5.js) ---
    let drops = [];
    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.parent('rain-canvas');
      for (let i = 0; i < 100; i++) drops.push(new Drop());
    }

    function draw() {
      clear();
      drops.forEach(d => { d.fall(); d.show(); });
    }

    class Drop {
      constructor() { this.reset(); }
      reset() {
        this.x = random(width);
        this.y = random(-500, -50);
        this.speed = random(5, 10);
      }
      fall() {
        this.y += this.speed;
        if (this.y > height) this.reset();
      }
      show() {
        stroke(0, 255, 65, 150);
        line(this.x, this.y, this.x, this.y + 15);
      }
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
