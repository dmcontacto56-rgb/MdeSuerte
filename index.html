<!DOCTYPE html>
<html lang="es"> 
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M DE SUERTE — Marco Mariscurrena</title>
  <style>
    /* --- CONFIGURACIÓN BASE --- */
    :root {
      --bg: #080808;
      --accent: #00ff41;
    }

    body {
      margin: 0;
      background-color: var(--bg);
      color: white;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    /* Contenedor del efecto de lluvia p5.js */
    #rain-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* --- NAVEGACIÓN --- */
    nav {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(8, 8, 8, 0.8);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .logo { font-weight: bold; letter-spacing: 2px; }

    /* --- GALERÍA MASONRY (SOLUCIÓN AL ERROR) --- */
    .gallery-section {
      padding: 60px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #666;
      margin-bottom: 40px;
      border-left: 2px solid var(--accent);
      padding-left: 15px;
    }

    .gallery-grid {
      /* Masonry puro con CSS */
      column-count: 3;
      column-gap: 20px;
      width: 100%;
    }

    .gallery-item {
      /* Evita que las imágenes se amontonen o se corten */
      display: inline-block;
      width: 100%;
      margin-bottom: 20px;
      break-inside: avoid; 
      background: #111;
      border-radius: 4px;
      overflow: hidden;
      transition: transform 0.4s ease;
    }

    .gallery-item:hover {
      transform: scale(1.02);
    }

    .gallery-item img {
      width: 100%;
      height: auto; /* Proporción real */
      display: block;
      filter: grayscale(100%);
      transition: filter 0.5s ease;
    }

    .gallery-item:hover img {
      filter: grayscale(0%);
    }

    /* Responsivo */
    @media (max-width: 900px) { .gallery-grid { column-count: 2; } }
    @media (max-width: 600px) { .gallery-grid { column-count: 1; } }

  </style>
</head>
<body>

  <div id="rain-canvas"></div>

  <nav>
    <div class="logo">M DE SUERTE</div>
    <div style="font-size: 0.8rem; color: var(--accent);">MARCO MARISCURRENA</div>
  </nav>

  <section class="gallery-section">
    <h2 class="section-title">Visual Production / Renders</h2>
    <div id="grid-renders" class="gallery-grid">
      </div>
  </section>

  <section class="gallery-section">
    <h2 class="section-title">Digital Arts / Layouts</h2>
    <div id="grid-design" class="gallery-grid">
      </div>
  </section>

  <script>
    // FUNCIÓN CARGA DE GALERÍA
    async function loadGallery(jsonFile, containerId) {
      const container = document.getElementById(containerId);
      try {
        const response = await fetch(jsonFile);
        const data = await response.json();
        
        container.innerHTML = ""; // Limpiar

        data.forEach(item => {
          const div = document.createElement('div');
          div.className = 'gallery-item';
          div.innerHTML = `<img src="${item.url}" alt="${item.titulo || 'Arte'}" loading="lazy">`;
          container.appendChild(div);
        });
      } catch (e) {
        console.error("Error cargando " + jsonFile, e);
      }
    }

    // Inicializar al cargar el DOM
    document.addEventListener('DOMContentLoaded', () => {
      loadGallery('renders.json', 'grid-renders');
      loadGallery('design.json', 'grid-design');
    });
  </script>

</body>
</html>
