<!DOCTYPE html>
<html lang="es"> 
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M DE SUERTE — Marco Mariscurrena</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>

  <style>
    :root {
      --bg: #080808;
      --accent: #00ff41;
    }

    body {
      margin: 0;
      background-color: var(--bg);
      color: white;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* Tu canvas de lluvia de fondo */
    #rain-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    nav {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: rgba(8, 8, 8, 0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
    }

    /* --- LA SOLUCIÓN AL DESASTRE DE LAS IMÁGENES --- */
    .gallery-section {
      padding: 60px 20px;
      max-width: 1300px;
      margin: 0 auto;
    }

    .gallery-grid {
      /* Estilo Pinterest que no encima archivos */
      column-count: 3;
      column-gap: 20px;
    }

    .gallery-item {
      display: block; /* Importante: bloque sólido */
      width: 100%;
      margin-bottom: 20px;
      break-inside: avoid; /* No corta la imagen al cambiar de columna */
      border-radius: 2px;
      overflow: hidden;
      background: #111;
      transition: transform 0.3s ease;
    }

    .gallery-item img {
      width: 100%;
      height: auto; /* Mantiene la proporción de tus renders 3D */
      display: block;
      filter: grayscale(1);
      transition: filter 0.5s ease;
    }

    .gallery-item:hover { transform: scale(1.02); }
    .gallery-item:hover img { filter: grayscale(0); }

    @media (max-width: 900px) { .gallery-grid { column-count: 2; } }
    @media (max-width: 600px) { .gallery-grid { column-count: 1; } }

    .section-title {
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

  <div id="rain-canvas"></div>

  <nav>
    <div class="logo">M DE SUERTE</div>
    <div style="font-size: 10px; color: var(--accent);">2026 — MARCO MARISCURRENA</div>
  </nav>

  <section class="gallery-section">
    <h2 class="section-title">Visual Production / Renders</h2>
    <div id="grid-renders" class="gallery-grid"></div>
  </section>

  <section class="gallery-section">
    <h2 class="section-title">Digital Arts / Layouts</h2>
    <div id="grid-design" class="gallery-grid"></div>
  </section>

  <script>
    // CARGA DE DATOS DESDE GITHUB
    async function loadGallery(jsonFile, containerId) {
      const container = document.getElementById(containerId);
      try {
        const response = await fetch(jsonFile);
        if(!response.ok) return;
        const data = await response.json();
        
        // Generar el HTML limpio
        const html = data.map(item => `
          <div class="gallery-item">
            <img src="${item.url}" alt="${item.titulo || 'M de Suerte'}" loading="lazy">
          </div>
        `).join('');
        
        container.innerHTML = html;
      } catch (e) {
        console.error("Error en " + jsonFile, e);
      }
    }

    // Inicializar
    window.addEventListener('load', () => {
      loadGallery('renders.json', 'grid-renders');
      loadGallery('design.json', 'grid-design');
    });

    // --- Tu código de p5.js original se mantiene aquí abajo ---
    // (Asegúrate de pegar tu lógica de las "drops" aquí si quieres que siga lloviendo)
  </script>

</body>
</html>
