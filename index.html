<!DOCTYPE html>
<html lang="es"> 
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M DE SUERTE — Marco Mariscurrena</title>
  
  <style>
    /* 1. CONFIGURACIÓN GENERAL */
    :root {
      --bg-color: #080808;
      --text-color: #ffffff;
      --accent-color: #00ff41; /* Verde Neón */
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      overflow-x: hidden;
    }

    /* 2. MEJORA DE LAS GALERÍAS (Estilo Revista/Malla) */
    .gallery-container {
      padding: 40px 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .gallery-grid {
      /* Esto crea el efecto de malla sin cortar imágenes */
      column-count: 3; 
      column-gap: 20px;
      width: 100%;
    }

    .gallery-item {
      display: inline-block; /* Importante para que funcione column-count */
      width: 100%;
      margin-bottom: 20px;
      break-inside: avoid; /* Evita que la imagen se parta entre columnas */
      background: #111;
      border-radius: 5px;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .gallery-item:hover {
      transform: translateY(-5px);
    }

    .gallery-item img {
      width: 100%;
      height: auto; /* Mantiene la proporción original */
      display: block;
      filter: grayscale(20%);
      transition: filter 0.3s ease;
    }

    .gallery-item:hover img {
      filter: grayscale(0%);
    }

    /* Ajuste para tablets y móviles */
    @media (max-width: 1024px) {
      .gallery-grid { column-count: 2; }
    }
    @media (max-width: 600px) {
      .gallery-grid { column-count: 1; }
    }

    /* Estilos de los Títulos de Galería */
    .gallery-title {
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 30px;
      color: #666;
      border-left: 2px solid var(--accent-color);
      padding-left: 15px;
    }

    /* Otros estilos básicos para que el index funcione */
    nav { padding: 20px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 100; background: rgba(8,8,8,0.9); }
    .logo { width: 40px; }
  </style>
</head>

<body>

  <nav>
    <div class="logo">
      </div>
    <div class="menu">MENU</div>
  </nav>

  <section id="renders" class="gallery-container">
    <h2 class="gallery-title">Visual Production / Renders</h2>
    <div id="grid-renders" class="gallery-grid">
      </div>
  </section>

  <section id="design" class="gallery-container">
    <h2 class="gallery-title">Digital Creation / Layouts</h2>
    <div id="grid-design" class="gallery-grid">
      </div>
  </section>

  <script>
    /**
     * Función para cargar cualquier galería dinámicamente
     * @param {string} jsonPath - Ruta del archivo .json
     * @param {string} containerId - ID del div donde se insertarán las fotos
     */
    async function loadGallery(jsonPath, containerId) {
      const container = document.getElementById(containerId);
      
      try {
        const response = await fetch(jsonPath);
        if (!response.ok) throw new Error(`No se pudo cargar ${jsonPath}`);
        
        const data = await response.json();

        // Limpiar contenedor
        container.innerHTML = '';

        data.forEach(item => {
          const itemElement = document.createElement('div');
          itemElement.className = 'gallery-item';

          // Estructura de la imagen
          itemElement.innerHTML = `
            <img src="${item.url}" alt="${item.titulo || 'M de Suerte'}" loading="lazy">
          `;

          container.appendChild(itemElement);
        });

      } catch (error) {
        console.error("Error en la galería:", error);
        container.innerHTML = `<p style="color:red">Error cargando imágenes de ${jsonPath}</p>`;
      }
    }

    // Inicializar las galerías al cargar la página
    document.addEventListener('DOMContentLoaded', () => {
      // Ajusta los nombres de tus archivos JSON aquí:
      loadGallery('renders.json', 'grid-renders');
      loadGallery('design.json', 'grid-design');
    });
  </script>

</body>
</html>
