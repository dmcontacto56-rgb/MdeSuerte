<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M DE SUERTE — Marco Mariscurrena</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
      overflow-x: hidden;
      font-family: sans-serif;
    }

    /* ── PARALLAX BACKGROUND ── */
    .parallax-bg {
      background-image: url('TU_IMAGEN_DE_FONDO.jpg');
      background-attachment: fixed;
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover;
      width: 100%;
      min-height: 100vh;
      background-color: #000; /* fallback si la imagen no carga */
    }

    /* iOS / touch devices: fixed no funciona bien, usar scroll */
    @supports (-webkit-touch-callout: none) {
      .parallax-bg {
        background-attachment: scroll;
      }
    }

    /* ── SECCIÓN PRINCIPAL ── */
    .arcade-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      min-height: 100vh;
    }

    /* ── TÍTULO ── */
    .arcade-title {
      text-align: center;
      font-size: 2.2rem;
      margin-bottom: 50px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      width: 100%;
    }

    /* ── CONTENEDOR DE BOTONES ── */
    .arcade-container {
      display: flex;
      flex-direction: row;          /* SIEMPRE horizontal */
      flex-wrap: nowrap;
      justify-content: center;
      align-items: flex-start;
      gap: 60px;
      width: 100%;
      max-width: 900px;
    }

    /* ── BOTÓN INDIVIDUAL ── */
    .arcade-button {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      flex: 0 0 auto;
      width: 220px;               /* Más grande */
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── IMAGEN DEL BOTÓN ──
       background: transparent elimina el rect negro.
       mix-blend-mode: lighten ignora píxeles negros del PNG.
       Si tus imágenes tienen fondo negro quemado, lighten los hace desaparecer. */
    .arcade-img-wrapper {
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;    /* SIN fondo */
      position: relative;
      transition: transform 0.12s ease;
    }

    .arcade-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: transparent;
      mix-blend-mode: lighten;    /* elimina el negro de fondo del PNG */
      image-rendering: auto;
      transition: transform 0.12s ease, filter 0.12s ease;
      pointer-events: none;
    }

    /* Sombra / glow de color bajo cada botón (como en la referencia) */
    .arcade-glow {
      width: 120px;
      height: 18px;
      border-radius: 50%;
      margin-top: -10px;
      margin-bottom: 18px;
      filter: blur(8px);
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .arcade-button:hover .arcade-glow,
    .arcade-button:active .arcade-glow {
      opacity: 1;
    }

    /* Colores de glow por botón */
    #btn-whatsapp .arcade-glow { background: #00ff80; }
    #btn-cv       .arcade-glow { background: #4fa3ff; }

    /* ── LABEL TIPO PÍLDORA (como en la referencia) ── */
    .arcade-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: filter 0.2s, transform 0.1s;
      white-space: nowrap;
      border: none;
      outline: none;
    }

    .arcade-label:active {
      transform: scale(0.97);
    }

    /* Label verde (WhatsApp) */
    #btn-whatsapp .arcade-label {
      background: #00e676;
      color: #000;
    }
    #btn-whatsapp .arcade-label:hover {
      filter: brightness(1.15);
    }

    /* Label azul (CV) */
    #btn-cv .arcade-label {
      background: transparent;
      color: #4fa3ff;
      border: 2px solid #4fa3ff;
    }
    #btn-cv .arcade-label:hover {
      background: #4fa3ff22;
      filter: brightness(1.1);
    }

    /* Punto / indicador en el label (como en la referencia desktop) */
    .label-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #btn-whatsapp .label-dot { background: #000; }
    #btn-cv       .label-dot { background: #4fa3ff; }

    /* Texto extra pequeño encima del nombre principal */
    .label-sub {
      font-size: 0.7rem;
      font-weight: 400;
      opacity: 0.75;
      letter-spacing: 0.04em;
      display: block;
    }

    .label-main {
      font-size: 0.9rem;
      font-weight: 800;
      display: block;
    }

    .label-text {
      display: flex;
      flex-direction: column;
      text-align: left;
    }

    /* ── ANIMACIÓN AL PRESIONAR ── */
    .arcade-button.pressed .arcade-img-wrapper {
      transform: translateY(6px) scale(0.94);
    }

    /* ── RESPONSIVO MÓVIL ── */
    @media (max-width: 600px) {
      .parallax-bg {
        background-attachment: scroll;
      }

      .arcade-title {
        font-size: 1.5rem;
        text-align: center;       /* centrado explícito */
        margin-bottom: 36px;
      }

      .arcade-container {
        flex-direction: row;      /* MANTENER horizontal en móvil */
        justify-content: center;
        gap: 20px;
        overflow-x: auto;
        padding: 0 10px 10px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .arcade-container::-webkit-scrollbar { display: none; }

      .arcade-button {
        width: 140px;
        flex: 0 0 140px;
      }

      .arcade-img-wrapper {
        width: 140px;
        height: 140px;
      }

      .arcade-glow {
        width: 80px;
        height: 12px;
      }

      .arcade-label {
        padding: 10px 14px;
        font-size: 0.75rem;
        text-align: center;
      }

      .label-sub { font-size: 0.62rem; }
      .label-main { font-size: 0.82rem; }
    }

    @media (max-width: 400px) {
      .arcade-button { width: 120px; flex: 0 0 120px; }
      .arcade-img-wrapper { width: 120px; height: 120px; }
    }
  </style>
</head>
<body>

  <div class="parallax-bg">
    <section class="arcade-section">

      <h1 class="arcade-title">Módulo Arcade</h1>

      <div class="arcade-container">

        <!-- BOTÓN WHATSAPP (verde) -->
        <div class="arcade-button" id="btn-whatsapp">
          <div class="arcade-img-wrapper">
            <img
              src="img_off_1.png"
              data-on="img_on_1.png"
              data-off="img_off_1.png"
              class="arcade-img"
              alt="WhatsApp"
              draggable="false"
            />
          </div>
          <div class="arcade-glow"></div>
          <div class="arcade-label">
            <span class="label-dot"></span>
            <span class="label-text">
              <span class="label-sub">Escríbeme</span>
              <span class="label-main">WhatsApp</span>
            </span>
          </div>
        </div>

        <!-- BOTÓN CV (azul) -->
        <div class="arcade-button" id="btn-cv">
          <div class="arcade-img-wrapper">
            <img
              src="img_off_2.png"
              data-on="img_on_2.png"
              data-off="img_off_2.png"
              class="arcade-img"
              alt="Descarga CV"
              draggable="false"
            />
          </div>
          <div class="arcade-glow"></div>
          <div class="arcade-label">
            <span class="label-dot"></span>
            <span class="label-text">
              <span class="label-sub">Descarga</span>
              <span class="label-main">Mi CV</span>
            </span>
          </div>
        </div>

      </div>
    </section>
  </div>

  <script>
    /* ── LÓGICA DE BOTONES ── */
    function initBtn(id, action) {
      const el = document.getElementById(id);
      if (!el) return;
      const img = el.querySelector('.arcade-img');

      function trigger(e) {
        e.preventDefault();
        el.classList.add('pressed');
        if (img.dataset.on) img.src = img.dataset.on;

        setTimeout(() => {
          el.classList.remove('pressed');
          if (img.dataset.off) img.src = img.dataset.off;
          if (action) action();
        }, 200);
      }

      el.addEventListener('click', trigger);
      el.addEventListener('touchend', trigger, { passive: false });
    }

    initBtn('btn-whatsapp', () => {
      /* Reemplaza con tu número. Formato: 521XXXXXXXXXX para México */
      window.open('https://wa.me/521XXXXXXXXXX?text=Hola%20Marco!', '_blank');
    });

    initBtn('btn-cv', () => {
      /* Reemplaza con la ruta real de tu CV */
      window.open('cv-marco-mariscurrena.pdf', '_blank');
    });

    /* ── PARALLAX JS FALLBACK (para iOS y dispositivos táctiles) ──
       Si background-attachment:fixed no funciona, simula parallax con transform */
    (function() {
      const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
      const bg = document.querySelector('.parallax-bg');

      if (isTouchDevice && bg) {
        /* En táctil ya usamos background-attachment:scroll vía @supports,
           pero si quieres un parallax suave puedes activar esto: */
        /* 
        window.addEventListener('scroll', () => {
          const scrollY = window.scrollY;
          bg.style.backgroundPositionY = `calc(50% + ${scrollY * 0.3}px)`;
        }, { passive: true });
        */
      }
    })();
  </script>

</body>
</html>
